<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">BC logo italic thick yellow</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Bold italic thick BC initials in yellow with yellow star inside C</desc>



<rect x="185" y="25" width="310" height="250" rx="52" fill="#1a1a18" style="fill:rgb(26, 26, 24);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- stroke layer for thickness -->
<text x="340" y="225" text-anchor="middle" style="fill:none;stroke:rgb(245, 239, 90);color:rgb(0, 0, 0);stroke-width:18px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Arial Rounded MT Bold&quot;, &quot;Arial Black&quot;, sans-serif;font-size:190px;font-weight:900;font-style:italic;text-anchor:middle;dominant-baseline:auto">BC</text>
<!-- fill layer -->
<text x="340" y="225" text-anchor="middle" style="fill:rgb(245, 239, 90);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Arial Rounded MT Bold&quot;, &quot;Arial Black&quot;, sans-serif;font-size:190px;font-weight:900;font-style:italic;text-anchor:middle;dominant-baseline:auto">BC</text>

<!-- yellow star inside C opening -->
<g transform="translate(436, 142)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
  <path d="M0,-15 L3.75,-3.75 L15,0 L3.75,3.75 L0,15 L-3.75,3.75 L-15,0 L-3.75,-3.75 Z" fill="#F5EF5A" style="fill:rgb(245, 239, 90);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</g>

</svg>